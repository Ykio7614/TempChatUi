name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rsync and SSH client
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: Configure SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf "%s" "$SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SERVER_PORT:-22}" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Ensure target directory exists
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PATH: ${{ secrets.SERVER_PATH }}
        run: |
          ssh -p "${SERVER_PORT:-22}" "$SERVER_USER@$SERVER_HOST" "mkdir -p '$SERVER_PATH'"

      - name: Sync project to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PATH: ${{ secrets.SERVER_PATH }}
        run: |
          rsync -az --delete \
            -e "ssh -p ${SERVER_PORT:-22}" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env' \
            --exclude '.env.prod' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            ./ "$SERVER_USER@$SERVER_HOST:$SERVER_PATH/"

      - name: Deploy on server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PATH: ${{ secrets.SERVER_PATH }}
        run: |
          ssh -p "${SERVER_PORT:-22}" "$SERVER_USER@$SERVER_HOST" << EOF
            set -e
            docker network create web >/dev/null 2>&1 || true
            cd "$SERVER_PATH"
            ENV_FILE=".env.prod"
            if [ ! -f "$ENV_FILE" ]; then
              ENV_FILE=".env"
            fi
            if [ ! -f "$ENV_FILE" ]; then
              echo "Missing .env.prod or .env in $SERVER_PATH" >&2
              exit 1
            fi
            docker compose --env-file "$ENV_FILE" -f docker-compose.prod.yml up -d --build
            docker image prune -f
            docker compose --env-file "$ENV_FILE" -f docker-compose.prod.yml ps
          EOF
