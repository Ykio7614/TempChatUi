services:
  tempchat-ui:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL}
        VITE_DEV_PROXY_TARGET: ${VITE_DEV_PROXY_TARGET:-}
    container_name: tempchat-ui
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - web

networks:
  web:
    external: true
