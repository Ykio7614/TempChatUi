services:
  frontend:
    image: ${FRONTEND_IMAGE:-tempchat-ui:latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL}
        VITE_DEV_PROXY_TARGET: ${VITE_DEV_PROXY_TARGET:-}
    restart: unless-stopped
    networks:
      - web

  caddy:
    image: caddy:2.10-alpine
    depends_on:
      - frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

networks:
  web:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
